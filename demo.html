<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
* { font-family: 'Noto Sans KR', sans-serif; }
html, body { height: 100%; margin: 0; }
.tab-active { color: var(--accent); }
.tab-inactive { color: #b0b0b0; }
.card-shadow { box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-green { background: #e8faf0; color: #2ba862; }
.badge-yellow { background: #fff8e1; color: #c49000; }
.badge-red { background: #ffeaea; color: #d94a4a; }
.badge-blue { background: #e8f4fd; color: #3a8fd4; }
.badge-gray { background: #f0f0f0; color: #888; }
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
input, select, textarea { outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--accent) !important; }
.overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.25); z-index: 90; }
.modal { position: fixed; bottom:0; left:0; width:100%; background: #fff; border-radius: 20px 20px 0 0; z-index: 100; max-height: 88%; overflow-y: auto; padding: 24px 20px 32px; }
:root {
  --accent: #5cc6ba;
  --accent-light: #e8faf5;
  --bg: #ffffff;
  --surface: #f7f8fa;
  --text: #222222;
  --text-sub: #888888;
  --coral: #f0907e;
  --yellow: #f5c842;
  --sky: #7ec8e3;
}
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
</style>
  <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: 'var(--accent)',
        'accent-light': 'var(--accent-light)',
        surface: 'var(--surface)',
        txt: 'var(--text)',
        sub: 'var(--text-sub)',
      }
    }
  }
}
</script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-white text-txt">
  <div id="app" class="h-full w-full flex flex-col overflow-hidden" style="max-width:480px;margin:0 auto;background:var(--bg);">
   <!-- Splash -->
   <div id="splash-screen" class="h-full w-full flex flex-col items-center justify-center" style="background:var(--bg);">
    <div style="width:72px;height:72px;border-radius:18px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
     <svg width="36" height="36" viewbox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z" /><path d="M2 17l10 5 10-5" /><path d="M2 12l10 5 10-5" />
     </svg>
    </div>
    <div style="font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.5px;" id="splash-title">
     TeachBee
    </div>
    <div style="font-size:13px;color:var(--text-sub);margin-top:6px;">
     과외쌤 전용 개인 비서
    </div>
   </div><!-- Main App -->
   <div id="main-app" class="h-full flex flex-col" style="display:none;">
    <!-- Header -->
    <div id="app-header" class="px-5 pt-5 pb-2 flex items-center justify-between flex-shrink-0">
     <div>
      <div id="header-title" style="font-size:20px;font-weight:700;color:var(--text);">
       TeachBee
      </div>
      <div id="header-greeting" style="font-size:12px;color:var(--text-sub);margin-top:1px;">
       오늘도 좋은 수업 되세요 ☀️
      </div>
     </div>
     <div class="flex gap-2">
      <button onclick="showNotifications()" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:var(--surface);"><i data-lucide="bell" style="width:18px;height:18px;color:var(--text-sub);"></i></button> <button onclick="showSettings()" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:var(--surface);"><i data-lucide="settings" style="width:18px;height:18px;color:var(--text-sub);"></i></button>
     </div>
    </div><!-- Content Area -->
    <div id="content-area" class="flex-1 overflow-y-auto scrollbar-hide px-5 pb-4">
     <!-- Filled by JS -->
    </div><!-- FAB --> <button id="fab-btn" onclick="openAddModal()" class="fixed flex items-center justify-center" style="width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;bottom:80px;right:calc(50% - 210px);box-shadow:0 4px 16px rgba(92,198,186,0.35);z-index:50;border:none;"> <i data-lucide="plus" style="width:24px;height:24px;"></i> </button> <!-- Tab Bar -->
    <div class="flex-shrink-0 flex items-center justify-around py-2 border-t" style="border-color:#f0f0f0;background:#fff;">
     <button onclick="switchTab('home')" class="flex flex-col items-center gap-0.5 py-1 tab-btn" data-tab="home"> <i data-lucide="home" style="width:20px;height:20px;"></i> <span style="font-size:10px;font-weight:500;">홈</span> </button> <button onclick="switchTab('calendar')" class="flex flex-col items-center gap-0.5 py-1 tab-btn" data-tab="calendar"> <i data-lucide="calendar" style="width:20px;height:20px;"></i> <span style="font-size:10px;font-weight:500;">달력</span> </button> <button onclick="switchTab('students')" class="flex flex-col items-center gap-0.5 py-1 tab-btn" data-tab="students"> <i data-lucide="users" style="width:20px;height:20px;"></i> <span style="font-size:10px;font-weight:500;">학생</span> </button> <button onclick="switchTab('billing')" class="flex flex-col items-center gap-0.5 py-1 tab-btn" data-tab="billing"> <i data-lucide="wallet" style="width:20px;height:20px;"></i> <span style="font-size:10px;font-weight:500;">정산</span> </button> <button onclick="switchTab('todo')" class="flex flex-col items-center gap-0.5 py-1 tab-btn" data-tab="todo"> <i data-lucide="check-circle" style="width:20px;height:20px;"></i> <span style="font-size:10px;font-weight:500;">할 일</span> </button>
    </div>
   </div><!-- Modal Container -->
   <div id="modal-overlay" class="overlay" style="display:none;" onclick="closeModal()"></div>
   <div id="modal-container" class="modal" style="display:none;"></div>
  </div>
  <script>
// ===== State =====
let allData = [];
let currentTab = 'home';
let selectedDate = new Date();
let calendarMonth = new Date();

const defaultConfig = {
  app_title: 'TeachBee',
  home_greeting: '오늘도 좋은 수업 되세요 ☀️',
  background_color: '#ffffff',
  surface_color: '#f7f8fa',
  text_color: '#222222',
  accent_color: '#5cc6ba',
  sub_text_color: '#888888'
};

// ===== Element SDK =====
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const bg = config.background_color || defaultConfig.background_color;
    const surface = config.surface_color || defaultConfig.surface_color;
    const txt = config.text_color || defaultConfig.text_color;
    const accent = config.accent_color || defaultConfig.accent_color;
    const sub = config.sub_text_color || defaultConfig.sub_text_color;
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--surface', surface);
    document.documentElement.style.setProperty('--text', txt);
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-light', accent + '18');
    document.documentElement.style.setProperty('--text-sub', sub);
    document.body.style.background = bg;

    const title = config.app_title || defaultConfig.app_title;
    const greeting = config.home_greeting || defaultConfig.home_greeting;
    const ht = document.getElementById('header-title');
    if (ht) ht.textContent = title;
    const hg = document.getElementById('header-greeting');
    if (hg) hg.textContent = greeting;
    const st = document.getElementById('splash-title');
    if (st) st.textContent = title;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      { get: () => config.sub_text_color || defaultConfig.sub_text_color, set: v => { config.sub_text_color = v; window.elementSdk.setConfig({ sub_text_color: v }); } },
    ],
    borderables: [],
    fontEditable: undefined,
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['home_greeting', config.home_greeting || defaultConfig.home_greeting],
  ])
});

// ===== Data SDK =====
const dataHandler = {
  onDataChanged(data) {
    allData = data;
    renderCurrentTab();
  }
};
(async () => {
  const r = await window.dataSdk.init(dataHandler);
  if (!r.isOk) console.error('Data SDK init failed');
  
  // Add sample data if database is empty
  if (allData.length === 0) {
    const today = new Date().toISOString().slice(0,10);
    const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0,10);
    
    // Sample students
    await window.dataSdk.create({
      type: 'student',
      student_name: '김준호',
      phone: '010-1234-5678',
      subject: '영어',
      day: '월, 수, 금',
      time: '15:00',
      location: '강남 카페',
      method: '대면',
      fee: 50000,
      payment_status: '입금완료',
      memo: '발음 교정 중심',
      created_at: new Date().toISOString()
    });
    
    const s2 = await window.dataSdk.create({
      type: 'student',
      student_name: '이수지',
      phone: '010-9876-5432',
      subject: '수학',
      day: '화, 목',
      time: '16:00',
      location: '온라인',
      method: '온라인',
      fee: 45000,
      payment_status: '미납',
      memo: '고등수학 기본 복습',
      created_at: new Date().toISOString()
    });
    
    const s3 = await window.dataSdk.create({
      type: 'student',
      student_name: '박민준',
      phone: '010-5555-6666',
      subject: '과학',
      day: '월, 금',
      time: '17:00',
      location: '자택',
      method: '대면',
      fee: 55000,
      payment_status: '입금완료',
      memo: '',
      created_at: new Date().toISOString()
    });
    
    // Sample lessons for today
    const lessonData = [
      { date: today, time: '15:00', subject: '영어 발음', location: '강남 카페' },
      { date: today, time: '16:00', subject: '수학 문제풀이', location: '온라인' }
    ];
    
    for (let i = 0; i < 3; i++) {
      const lesson = lessonData[i] || { date: today, time: '18:00', subject: 'Test', location: 'Test' };
      await window.dataSdk.create({
        type: 'lesson',
        lesson_student_id: [allData.find(d=>d.student_name==='김준호')?.__backendId, allData.find(d=>d.student_name==='이수지')?.__backendId, allData.find(d=>d.student_name==='박민준')?.__backendId][i],
        lesson_date: lesson.date,
        time: lesson.time,
        subject: lesson.subject,
        location: lesson.location,
        method: i === 1 ? '온라인' : '대면',
        homework: i === 0 ? 'p.45-50 문제 풀기' : '',
        homework_checked: false,
        prep_done: false,
        status: '예정',
        memo: '',
        created_at: new Date().toISOString()
      });
    }
    
    // Sample todos
    await window.dataSdk.create({
      type: 'todo',
      todo_text: '수지 학생 입금 확인 메시지 보내기',
      todo_date: today,
      todo_done: false,
      created_at: new Date().toISOString()
    });
    
    await window.dataSdk.create({
      type: 'todo',
      todo_text: '어제 숙제 채점하기',
      todo_date: today,
      todo_done: false,
      created_at: new Date().toISOString()
    });
  }
  
  switchTab('home');
})();

// ===== Helpers =====
function getStudents() { return allData.filter(d => d.type === 'student'); }
function getLessons() { return allData.filter(d => d.type === 'lesson'); }
function getCancels() { return allData.filter(d => d.type === 'cancel'); }
function getTodos() { return allData.filter(d => d.type === 'todo'); }

function fmt(date) {
  const d = new Date(date);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtFull(date) {
  const d = new Date(date);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function getStudentName(id) {
  const s = allData.find(d => d.__backendId === id);
  return s ? s.student_name : '미지정';
}
function payBadge(status) {
  if (status === '입금완료') return '<span class="badge badge-green">입금완료</span>';
  if (status === '미납') return '<span class="badge badge-red">미납</span>';
  if (status === '부분입금') return '<span class="badge badge-yellow">부분입금</span>';
  return '<span class="badge badge-gray">대기</span>';
}
function statusBadge(status) {
  if (status === '완료') return '<span class="badge badge-green">완료</span>';
  if (status === '결강') return '<span class="badge badge-red">결강</span>';
  if (status === '보강') return '<span class="badge badge-blue">보강</span>';
  return '<span class="badge badge-gray">예정</span>';
}

// Init icons
setTimeout(()=>{
  document.getElementById('splash-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  lucide.createIcons();
}, 1800);

// ===== Tabs =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    const isActive = b.dataset.tab === tab;
    b.className = `flex flex-col items-center gap-0.5 py-1 tab-btn ${isActive ? 'tab-active' : 'tab-inactive'}`;
  });
  document.getElementById('app-header').style.display = (tab === 'calendar') ? 'flex' : 'none';
  renderCurrentTab();
}

function renderCurrentTab() {
  const area = document.getElementById('content-area');
  if (currentTab === 'home') renderHome(area);
  else if (currentTab === 'calendar') renderCalendar(area);
  else if (currentTab === 'students') renderStudents(area);
  else if (currentTab === 'billing') renderBilling(area);
  else if (currentTab === 'todo') renderTodoTab(area);
  lucide.createIcons();
}

// ===== HOME =====
function renderHome(el) {
  const today = new Date();
  const todayStr_val = todayStr();
  const todayLessons = getLessons().filter(l => l.lesson_date === todayStr_val).sort((a,b) => (a.time||'').localeCompare(b.time||''));
  const unpaid = getStudents().filter(s => s.payment_status === '미납');
  const makeup = getCancels().filter(c => !c.makeup_done);
  const todos = getTodos().filter(t => !t.todo_done && t.todo_date === todayStr_val);

  el.innerHTML = `<div class="fade-in">
    <!-- Compact header banner -->
    <div class="rounded-2xl p-4 mb-6 card-shadow" style="background:linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);border:1px solid #e5e7eb;">
      <div style="font-size:12px;color:var(--text-sub);margin-bottom:2px;">오늘</div>
      <div style="font-size:18px;font-weight:700;color:var(--text);">${today.toLocaleDateString('ko-KR', {month:'short', day:'numeric', weekday:'long'})}</div>
    </div>

    <!-- KPI Stats Cards - Clean Design -->
    <div class="grid grid-cols-4 gap-2.5 mb-6">
      <div class="rounded-xl p-3 text-center card-shadow" style="background:#fff;border:1px solid #f0f0f0;">
        <div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:2px;">${todayLessons.length}</div>
        <div style="font-size:10px;color:var(--text-sub);font-weight:500;">수업</div>
      </div>
      <div class="rounded-xl p-3 text-center card-shadow" style="background:#fff;border:1px solid #f0f0f0;">
        <div style="font-size:20px;font-weight:700;color:#f0907e;margin-bottom:2px;">${unpaid.length}</div>
        <div style="font-size:10px;color:var(--text-sub);font-weight:500;">미납</div>
      </div>
      <div class="rounded-xl p-3 text-center card-shadow" style="background:#fff;border:1px solid #f0f0f0;">
        <div style="font-size:20px;font-weight:700;color:#7ec8e3;margin-bottom:2px;">${makeup.length}</div>
        <div style="font-size:10px;color:var(--text-sub);font-weight:500;">보강</div>
      </div>
      <div class="rounded-xl p-3 text-center card-shadow" style="background:#fff;border:1px solid #f0f0f0;">
        <div style="font-size:20px;font-weight:700;color:#f5c842;margin-bottom:2px;">${todos.length}</div>
        <div style="font-size:10px;color:var(--text-sub);font-weight:500;">할 일</div>
      </div>
    </div>

    <!-- Today's Schedule Section -->
    <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;">📅 오늘 수업</div>
    ${todayLessons.length === 0 ? 
      `<div class="rounded-2xl p-6 text-center card-shadow mb-6" style="background:#fafbfc;border:1px solid #f0f0f0;">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--accent-light);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;">
          <i data-lucide="calendar" style="width:24px;height:24px;color:var(--accent);"></i>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">오늘 수업이 없네요</div>
        <div style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">다른 할 일을 체크하거나 수업을 추가해보세요</div>
        <div class="flex gap-2 justify-center">
          <button onclick="switchTab('todo')" class="px-4 py-2 rounded-lg" style="background:var(--accent);color:#fff;font-size:12px;font-weight:500;">할 일 보기</button>
          <button onclick="openLessonForm()" class="px-4 py-2 rounded-lg" style="background:var(--surface);color:var(--text);font-size:12px;font-weight:500;">수업 추가</button>
        </div>
      </div>` :
      `<div class="mb-6">${todayLessons.map(l => `
        <div class="rounded-xl p-3.5 mb-2.5 card-shadow" style="background:#fff;border:1px solid #f0f0f0;cursor:pointer;" onclick="openLessonDetail('${l.__backendId}')">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3" style="flex:1;">
              <div style="font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:6px 10px;border-radius:6px;min-width:50px;text-align:center;">${l.time||'-'}</div>
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--text);">${getStudentName(l.lesson_student_id)}</div>
                <div style="font-size:11px;color:var(--text-sub);">${l.subject||''} ${l.location ? '·' + l.location : ''}</div>
              </div>
            </div>
            <i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-sub);"></i>
          </div>
        </div>
      `).join('')}</div>`}

    <!-- Today's Todos -->
    <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;">✅ 오늘 할 일</div>
    ${todos.length === 0 ?
      `<div class="rounded-2xl p-6 text-center card-shadow mb-6" style="background:#fafbfc;border:1px solid #f0f0f0;">
        <div style="width:48px;height:48px;border-radius:50%;background:#e8faf0;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;">
          <i data-lucide="check-circle" style="width:24px;height:24px;color:var(--accent);"></i>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">할 일이 없어요</div>
        <div style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">할 일을 추가해서 체계적으로 관리하세요</div>
        <button onclick="openTodoForm()" class="w-full py-2 rounded-lg" style="background:var(--accent);color:#fff;font-size:12px;font-weight:500;">할 일 추가</button>
      </div>` :
      `<div class="mb-6">${todos.map(t=>`
        <div class="flex items-center gap-3 rounded-xl p-3.5 mb-2.5 card-shadow" style="background:#fff;border:1px solid #f0f0f0;">
          <button onclick="event.stopPropagation();toggleTodo('${t.__backendId}',true)" style="width:20px;height:20px;border-radius:50%;border:2px solid var(--accent);background:transparent;flex-shrink:0;cursor:pointer;"></button>
          <span style="font-size:13px;color:var(--text);flex:1;">${t.todo_text}</span>

// ===== CALENDAR =====
function renderCalendar(el) {
  const today = new Date();
  const todayS = todayStr();
  
  // Generate 4 weeks starting from today
  let weeks = [];
  for (let w = 0; w < 4; w++) {
    let week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(today.getDate() + (w * 7) + d);
      week.push(date);
    }
    weeks.push(week);
  }

  let timelineHtml = '';
  weeks.forEach((week, wIdx) => {
    const weekStart = week[0];
    const weekEnd = week[6];
    timelineHtml += `<div style="margin-bottom:16px;">
      <div style="font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:8px;">
        ${weekStart.toLocaleDateString('ko-KR', {month:'short', day:'numeric'})} - ${weekEnd.toLocaleDateString('ko-KR', {month:'short', day:'numeric'})}
      </div>
      <div class="flex gap-1.5 overflow-x-auto scrollbar-hide pb-2">`;
    
    week.forEach(date => {
      const ds = date.toISOString().slice(0,10);
      const isToday = ds === todayS;
      const dayLessons = getLessons().filter(l => l.lesson_date === ds);
      const hasLesson = dayLessons.length > 0;
      const days = ['일','월','화','수','목','금','토'];
      
      timelineHtml += `<div style="flex-shrink:0;cursor:pointer;" onclick="selectedDate=new Date('${ds}');renderCurrentTab();">
        <div class="rounded-2xl p-3 text-center" style="width:56px;background:${isToday?'var(--accent)':'var(--surface)'};border:${hasLesson?'2px solid var(--accent)':'none'};padding-top:8px;">
          <div style="font-size:10px;color:${isToday?'#fff':'var(--text-sub)'};font-weight:500;">${days[date.getDay()]}</div>
          <div style="font-size:16px;font-weight:700;color:${isToday?'#fff':'var(--text)'};margin-top:2px;">${date.getDate()}</div>
          ${hasLesson ? `<div style="font-size:10px;color:${isToday?'#fff':'var(--accent)'};margin-top:4px;font-weight:600;">${dayLessons.length}</div>` : ''}
        </div>
      </div>`;
    });
    
    timelineHtml += '</div></div>';
  });

  const selStr = selectedDate.toISOString().slice(0,10);
  const dayLessons = getLessons().filter(l => l.lesson_date === selStr).sort((a,b) => (a.time||'').localeCompare(b.time||''));

  el.innerHTML = `<div class="fade-in">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px;">📅 4주 타임라인</div>
    ${timelineHtml}

    <div style="font-size:14px;font-weight:700;margin:20px 0 12px;">📌 ${fmtFull(selStr)}</div>
    ${dayLessons.length === 0 ? 
      '<div class="rounded-2xl p-4 text-center card-shadow" style="background:var(--surface);color:var(--text-sub);font-size:13px;">수업이 없어요</div>' :
      dayLessons.map(l => `
        <div class="rounded-2xl p-4 mb-2 card-shadow" style="background:#fff;border:1px solid #f0f0f0;cursor:pointer;" onclick="openLessonDetail('${l.__backendId}')">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div style="font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:4px 8px;border-radius:6px;">${l.time||'-'}</div>
              <div><span style="font-weight:600;">${getStudentName(l.lesson_student_id)}</span><span style="font-size:12px;color:var(--text-sub);margin-left:6px;">${l.subject||''}</span></div>
            </div>
            ${statusBadge(l.status)}
          </div>
          ${l.location ? `<div style="font-size:11px;color:var(--text-sub);margin-top:6px;">📍 ${l.location}</div>` : ''}
        </div>
      `).join('')}
  </div>`;
}

async function toggleTodo(id, val) {
  const t = allData.find(d=>d.__backendId===id);

}
async function deleteTodo(id) {
  const t = allData.find(d=>d.__backendId===id);
  if(!t) return;
  await window.dataSdk.delete(t);
}

async function saveStudent(e, editId) {
  e.preventDefault();
  const f = new FormData(e.target);
  const btn = document.getElementById('student-submit-btn');
  btn.textContent = '저장 중...'; btn.disabled = true;
  const data = {
    type: 'student',
    student_name: f.get('student_name'),
    phone: f.get('phone'),
    subject: f.get('subject'),
    day: f.get('day'),
    time: f.get('time'),
    location: f.get('location'),
    fee: Number(f.get('fee'))||0,
    payment_status: f.get('payment_status'),
    memo: f.get('memo'),
    created_at: new Date().toISOString()
  };
  let r;
  if (editId) {
    const orig = allData.find(d=>d.__backendId===editId);
    r = await window.dataSdk.update({...orig, ...data});
  } else {
    if (allData.length >= 999) { showToast('데이터 한도에 도달했어요'); btn.textContent='추가하기'; btn.disabled=false; return; }
    r = await window.dataSdk.create(data);
  }

async function deleteStudent(id) {
  const s = allData.find(d=>d.__backendId===id);

async function saveLesson(e, editId) {
  e.preventDefault();
  const f = new FormData(e.target);
  const btn = document.getElementById('lesson-submit-btn');
  btn.textContent='저장 중...'; btn.disabled=true;
  const data = {
    type:'lesson', lesson_student_id:f.get('lesson_student_id'), lesson_date:f.get('lesson_date'),
    time:f.get('time'), subject:f.get('subject'), location:f.get('location'), method:f.get('method'),
    homework:f.get('homework'), homework_checked:false, prep_done:false, status:'예정', memo:f.get('memo'),
    created_at:new Date().toISOString()
  };
  let r;
  if(editId) { const orig=allData.find(d=>d.__backendId===editId); r=await window.dataSdk.update({...orig,...data,status:orig.status,homework_checked:orig.homework_checked,prep_done:orig.prep_done}); }
  else { if(allData.length>=999){showToast('데이터 한도 도달');btn.textContent='추가하기';btn.disabled=false;return;} r=await window.dataSdk.create(data); }
  if(r.isOk){closeModal();showToast(editId?'수정 완료!':'수업 추가 완료!');}
  else{showToast('오류 발생');btn.textContent=editId?'수정 완료':'추가하기';btn.disabled=false;}
}

async function toggleLessonField(id,field,val) {

  setTimeout(()=>openLessonDetail(id),300);
}

async function updateLessonStatus(id,status) {
  const l = allData.find(d=>d.__backendId===id);
  if(!l) return;
  await window.dataSdk.update({...l, status});

    if(allData.length<999) await window.dataSdk.create({type:'cancel',lesson_student_id:l.lesson_student_id,cancel_date:l.lesson_date,cancel_reason:'',original_lesson_id:id,makeup_date:'',makeup_done:false,created_at:new Date().toISOString()});

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;z-index:200;animation:fadeIn .3s;';

}
